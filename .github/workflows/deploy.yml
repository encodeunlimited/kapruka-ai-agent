name: Auto Deploy to Droplet

on:
  push:
    branches:
      - main  # Make sure this matches your main branch name (main or master)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Droplet and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # Navigate to the code folder
            cd ~/cloud-encode-suite/kapruka-agent
            
            # Pull the latest changes from GitHub
            git pull origin main
            
            # Navigate to the master suite folder
            cd ~/cloud-encode-suite
            
            # Rebuild and restart ONLY the kapruka agent with the new code
            docker compose up -d --build agentkapruka